org: evssz
service: api-web-scraping-2

provider:
  name: aws
  runtime: python3.12
  memorySize: 1024
  timeout: 30
  iam:
    role: arn:aws:iam::468251834706:role/LabRole

functions:
  scrape_table:
    handler: scrap_table.lambda_handler  # Asegúrate de que el nombre del archivo y la función coincidan
    layers:
      - arn:aws:lambda:us-east-1:468251834706:layer:chrome-aws-lambda:10  # ARN de la capa con Chromium y Chromedriver
    memorySize: 1024
    timeout: 20
    events:
      - http:
          path: /scrape/table
          method: get
          cors: true
          integration: lambda

resources:
  Resources:
    TablaWebScrapping2:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: TablaWebScrapping_2
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
